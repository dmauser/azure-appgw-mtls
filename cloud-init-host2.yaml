#cloud-config
package_update: true
package_upgrade: true

packages:
  - nginx
  - openssl

write_files:
  - path: /etc/nginx/sites-available/default
    content: |
      # ──────────────────────────────────────────────────────────────
      # Port 443 — Application Gateway facing listener
      # ──────────────────────────────────────────────────────────────
      # ssl_verify_client is OFF; the App Gateway handles the client
      # certificate handshake (Passthrough or Strict mode) and injects
      # the certificate metadata as HTTP headers via rewrite rules.
      # Only the App Gateway subnet (10.0.1.0/24) is allowed to connect.
      # ──────────────────────────────────────────────────────────────
      server {
          listen 443 ssl;
          server_name _;

          ssl_certificate /etc/nginx/ssl/server.crt;
          ssl_certificate_key /etc/nginx/ssl/server.key;
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_ciphers HIGH:!aNULL:!MD5;

          # Do NOT request a client certificate — App Gateway already did that
          ssl_verify_client off;

          # Restrict to App Gateway subnet
          allow 10.0.1.0/24;
          deny all;

          root /var/www/html;
          index index.html;

          # Health probe endpoint for App Gateway (no auth required)
          location = /healthz {
              return 200 'OK';
              add_header Content-Type text/plain;
          }

          # Diagnostic endpoint — returns App Gateway-injected certificate headers
          location = /whoami {
              default_type application/json;
              return 200
              '{'
              '"listener":"appgw-443",'
              '"remote_addr":"$remote_addr",'
              '"host":"$host",'
              '"request_uri":"$request_uri",'
              '"x_forwarded_for":"$http_x_forwarded_for",'
              '"x_forwarded_proto":"$http_x_forwarded_proto",'
              '"x_client_cert_verify":"$http_x_client_cert_verify",'
              '"x_client_cert_subject":"$http_x_client_cert_subject",'
              '"x_client_cert_issuer":"$http_x_client_cert_issuer",'
              '"x_client_cert_fingerprint":"$http_x_client_cert_fingerprint",'
              '"x_client_cert_present":"$http_x_client_cert"'
              '}';
          }

          # Enforce mTLS via App Gateway headers
          location / {
              if ($http_x_client_cert = "") {
                  return 403 'mTLS client certificate required (via Application Gateway)';
              }
              try_files $uri $uri/ =404;
          }
      }

      # ──────────────────────────────────────────────────────────────
      # Port 8443 — Direct internal mTLS listener
      # ──────────────────────────────────────────────────────────────
      # Real mutual TLS: nginx itself requests and validates the client
      # certificate during the TLS handshake. Used by internal callers
      # (jumpbox, Bastion tunnels) that connect directly to the VM.
      # ──────────────────────────────────────────────────────────────
      server {
          listen 8443 ssl;
          server_name _;

          ssl_certificate /etc/nginx/ssl/server.crt;
          ssl_certificate_key /etc/nginx/ssl/server.key;
          ssl_client_certificate /etc/nginx/ssl/ca.crt;
          ssl_verify_client on;
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_ciphers HIGH:!aNULL:!MD5;

          root /var/www/html;
          index index.html;

          # Diagnostic endpoint — returns native nginx mTLS variables
          location = /whoami {
              default_type application/json;
              return 200
              '{'
              '"listener":"direct-8443",'
              '"remote_addr":"$remote_addr",'
              '"host":"$host",'
              '"ssl_client_verify":"$ssl_client_verify",'
              '"ssl_client_s_dn":"$ssl_client_s_dn",'
              '"ssl_client_i_dn":"$ssl_client_i_dn",'
              '"ssl_client_fingerprint":"$ssl_client_fingerprint",'
              '"ssl_client_serial":"$ssl_client_serial"'
              '}';
          }

          location / {
              # ssl_verify_client on already rejects connections without a valid cert (403)
              try_files $uri $uri/ =404;
          }
      }
  
  - path: /var/www/html/index.html
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Host2 - Blue</title>
          <style>
              body {
                  margin: 0;
                  padding: 0;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  min-height: 100vh;
                  background: linear-gradient(135deg, #4dabf7 0%, #228be6 100%);
                  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
              }
              .container {
                  text-align: center;
                  background: rgba(255, 255, 255, 0.95);
                  padding: 60px 80px;
                  border-radius: 20px;
                  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
              }
              h1 {
                  color: #1864ab;
                  font-size: 4em;
                  margin: 0;
                  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
              }
              p {
                  color: #495057;
                  font-size: 1.5em;
                  margin-top: 20px;
              }
              .badge {
                  display: inline-block;
                  background: #1864ab;
                  color: white;
                  padding: 10px 30px;
                  border-radius: 50px;
                  margin-top: 20px;
                  font-weight: bold;
                  font-size: 1.2em;
              }
              .mtls-indicator {
                  margin-top: 30px;
                  padding: 20px;
                  background: #d3f9d8;
                  border-left: 4px solid #2f9e44;
                  border-radius: 5px;
              }
              .mtls-indicator h3 {
                  margin: 0 0 10px 0;
                  color: #2f9e44;
              }
          </style>
      </head>
      <body>
          <div class="container">
              <h1>🔵 HOST2</h1>
              <p>You are connected to the BLUE server</p>
              <div class="badge">Backend Server #2</div>
              <div class="mtls-indicator">
                  <h3>🔒 mTLS Secured Connection</h3>
                  <p style="font-size: 0.9em; margin: 0;">Mutual TLS authentication active</p>
              </div>
          </div>
      </body>
      </html>

runcmd:
    - mkdir -p /etc/nginx/ssl
    # Deploy real CA-signed certificates embedded during deployment
    - echo '__CA_CERT_B64__' | base64 -d > /etc/nginx/ssl/ca.crt
    - echo '__SERVER_CERT_B64__' | base64 -d > /etc/nginx/ssl/server.crt
    - echo '__SERVER_KEY_B64__' | base64 -d > /etc/nginx/ssl/server.key
    - chmod 600 /etc/nginx/ssl/server.key
    - chown -R www-data:www-data /etc/nginx/ssl
    - chown -R www-data:www-data /var/www/html
    - chmod 755 /var/www/html
    - systemctl enable nginx
    - systemctl start nginx
    - echo "Host2 cloud-init complete with real certificates" > /var/log/cloud-init-done.log
